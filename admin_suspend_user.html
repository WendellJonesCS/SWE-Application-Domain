{% extends "layout.html" %}

{% block title %}Suspend User - LockBook{% endblock %}

{% block body %}
<div class="nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/admin/users">Manage Users</a>
    <a href="/admin/requests">User Requests</a>
    <a href="/admin/create-user">Create User</a>
    <a href="/admin/expired-passwords">Expired Passwords</a>
    <a href="/logout" style="float: right;">Logout</a>
</div>

<div style="max-width: 600px; margin: 30px auto;">
    <h2>Suspend User: {{ user.username }}</h2>

    <form method="POST">
        <div class="form-group">
            <label>Start Date:</label>
            <input type="date" name="start_date" required>
        </div>

        <div class="form-group">
            <label>End Date:</label>
            <input type="date" name="end_date" required>
        </div>

        <div class="form-group">
            <label>Reason:</label>
            <textarea name="reason" rows="4"></textarea>
        </div>

        <div class="form-group">
            <button type="submit">Suspend User</button>
            <a href="/admin/users" class="btn-secondary" style="margin-left: 10px; display: inline-block; padding: 10px 20px;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
