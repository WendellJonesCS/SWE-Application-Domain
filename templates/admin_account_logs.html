<h2>Account Event Logs</h2>

<table>
    <tr>
        <th>Before</th>
        <th>After</th>
        <th>User ID</th>
        <th>Date</th>
    </tr>

    {% for log in logs %}
    <tr>
        <td>{{ log.before }}</td>
        <td>{{ log.after }}</td>
        <td>{{ log.user_id }}</td>
        <td>{{ log.timestamp }}</td>
    </tr>
    {% endfor %}
</table>
