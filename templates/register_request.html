{% extends "layout.html" %}
{% block title %}Request Access - LockBook{% endblock %}
{% block body %}

<div class="row justify-content-center mt-4">
    <div class="col-sm-10 col-md-7 col-lg-5">
        <div class="card">
            <div class="card-header-primary text-center">
                <i class="bi bi-person-plus me-2"></i>Request Access
            </div>
            <div class="card-body p-4">
                <form method="POST" action="/register-request">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">First Name <span class="text-danger">*</span></label>
                            <input type="text" name="first_name" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Last Name <span class="text-danger">*</span></label>
                            <input type="text" name="last_name" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Address</label>
                            <input type="text" name="address" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Date of Birth <span class="text-danger">*</span></label>
                            <input type="date" name="date_of_birth" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="col-12 mt-2">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-send me-1"></i>Submit Request
                            </button>
                        </div>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center bg-transparent py-3">
                <a href="/" class="text-decoration-none small"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
