{% extends "layout.html" %}

{% block title %}Edit Account{% endblock %}

{% block body %}

<div class="nav">
    <a href="/accounts">Back to Accounts</a>
</div>

<h2>Edit Account</h2>

<form method="POST">

    <div class="form-group">
        <label>Account Name</label>
        <input type="text" name="account_name" value="{{ account.account_name }}">
    </div>

    <div class="form-group">
        <label>Category</label>
        <input type="text" name="category" value="{{ account.category }}">
    </div>

    <div class="form-group">
        <label>Subcategory</label>
        <input type="text" name="subcategory" value="{{ account.subcategory }}">
    </div>

    <button type="submit">Update Account</button>

</form>

{% endblock %}
