{% extends "layout.html" %}
{% block title %}Reject Entry - LockBook{% endblock %}
{% block body %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header-primary">
                <i class="bi bi-x-circle me-2"></i>Reject Entry {{ entry.entry_number }}
            </div>
            <div class="card-body">
                <div class="alert alert-warning mb-4">
                    <i class="bi bi-exclamation-triangle me-2"></i>
                    You are about to reject journal entry <strong>{{ entry.entry_number }}</strong>.
                    Please provide a reason below.
                </div>
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Rejection Reason <span class="text-danger">*</span></label>
                        <textarea name="reason" class="form-control" rows="4"
                                  placeholder="Explain why this entry is being rejected…" required></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-x-lg me-1"></i>Confirm Rejection
                        </button>
                        <a href="{{ url_for('journal_entries') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
