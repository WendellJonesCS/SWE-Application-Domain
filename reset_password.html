{% extends "layout.html" %}
{% block title %}Reset Password - LockBook{% endblock %}
{% block body %}

<div class="row justify-content-center mt-5">
    <div class="col-sm-10 col-md-6 col-lg-4">
        <div class="card">
            <div class="card-header-primary text-center">
                <i class="bi bi-shield-lock me-2"></i>Reset Password
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">New Password <span class="text-danger">*</span></label>
                        <input type="password" name="new_password" class="form-control" required>
                        <div class="form-text">8+ characters, start with a letter, include a number and special character.</div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Confirm Password <span class="text-danger">*</span></label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-check-lg me-1"></i>Reset Password
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
