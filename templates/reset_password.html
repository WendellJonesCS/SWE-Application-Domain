{% extends "layout.html" %}

{% block title %}Reset Password - LockBook{% endblock %}

{% block body %}
<div style="max-width: 400px; margin: 50px auto;">
    <h2 style="text-align: center; margin-bottom: 30px;">Reset Password</h2>

    <form method="POST">
        <div class="form-group">
            <label>New Password:</label>
            <input type="password" name="new_password" required>
            <small>Must be 8+ characters, start with letter, contain letter, number, and special character</small>
        </div>

        <div class="form-group">
            <label>Confirm Password:</label>
            <input type="password" name="confirm_password" required>
        </div>

        <div class="form-group">
            <button type="submit" style="width: 100%;">Reset Password</button>
        </div>
    </form>
</div>
{% endblock %}
