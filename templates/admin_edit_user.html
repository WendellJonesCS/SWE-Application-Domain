{% extends "layout.html" %}

{% block title %}Edit User - LockBook{% endblock %}

{% block body %}
<div class="nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/admin/users">Manage Users</a>
    <a href="/admin/requests">User Requests</a>
    <a href="/admin/create-user">Create User</a>
    <a href="/admin/expired-passwords">Expired Passwords</a>
    <a href="/logout" style="float: right;">Logout</a>
</div>

<div style="max-width: 600px; margin: 30px auto;">
    <h2>Edit User: {{ user.username }}</h2>

    <form method="POST">
        <div class="form-group">
            <label>First Name:</label>
            <input type="text" name="first_name" value="{{ user.first_name }}" required>
        </div>

        <div class="form-group">
            <label>Last Name:</label>
            <input type="text" name="last_name" value="{{ user.last_name }}" required>
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" name="email" value="{{ user.email }}" required>
        </div>

        <div class="form-group">
            <label>Address:</label>
            <input type="text" name="address" value="{{ user.address or '' }}">
        </div>

        <div class="form-group">
            <label>Role:</label>
            <select name="role_id" required>
                {% for role in roles %}
                <option value="{{ role.role_id }}" {% if role.role_id == user.role_id %}selected{% endif %}>
                    {{ role.role_name.replace('ROLE_', '') }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Status:</label>
            <select name="is_active" required>
                <option value="1" {% if user.is_active %}selected{% endif %}>Active</option>
                <option value="0" {% if not user.is_active %}selected{% endif %}>Inactive</option>
            </select>
        </div>

        <div class="form-group">
            <button type="submit">Update User</button>
            <a href="/admin/users" class="btn-secondary" style="margin-left: 10px; display: inline-block; padding: 10px 20px;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
