{% extends "layout.html" %}

{% block title %}Request Access - LockBook{% endblock %}

{% block body %}
<div style="max-width: 500px; margin: 30px auto;">
    <h2 style="text-align: center; margin-bottom: 30px;">Request Access</h2>

    <form method="POST" action="/register-request">
        <div class="form-group">
            <label>First Name:</label>
            <input type="text" name="first_name" required>
        </div>

        <div class="form-group">
            <label>Last Name:</label>
            <input type="text" name="last_name" required>
        </div>

        <div class="form-group">
            <label>Address:</label>
            <input type="text" name="address">
        </div>

        <div class="form-group">
            <label>Date of Birth:</label>
            <input type="date" name="date_of_birth" required>
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <button type="submit" style="width: 100%;">Submit Request</button>
        </div>
    </form>

    <div style="text-align: center; margin-top: 20px;">
        <a href="/">Back to Login</a>
    </div>
</div>
{% endblock %}
