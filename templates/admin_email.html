<h2>Send Email</h2>

<form method="POST">
    <label>To:</label>
    <select name="user_id">
        {% for user in users %}
        <option value="{{ user.id }}">{{ user.email }}</option>
        {% endfor %}
    </select>

    <label>Message:</label>
    <textarea name="message"></textarea>

    <button type="submit">Send</button>
</form>
