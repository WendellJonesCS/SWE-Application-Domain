{% extends "layout.html" %}

{% block title %}Add Account - LockBook{% endblock %}

{% block body %}
<style>
    .form-container {
        max-width: 680px;
        margin: 0 auto;
    }
    .category-display {
        margin-top: 6px;
        font-size: 0.9rem;
        color: #555;
    }
    .category-display span {
        font-weight: bold;
        color: #2c3e50;
    }
    .form-actions {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 10px;
    }
    .hint {
        font-size: 0.8rem;
        color: #888;
        margin-top: 3px;
    }
</style>

<div class="form-container">
    <h2 style="margin-bottom: 20px;">Add New Account</h2>

    <form method="POST" action="{{ url_for('accounts_add') }}">

        <div class="form-group">
            <label for="account_name" title="The unique display name for this account">
                Account Name <span style="color:red;">*</span>
            </label>
            <input type="text" id="account_name" name="account_name"
                   value="{{ request.form.get('account_name', '') }}"
                   required
                   placeholder="e.g. Cash and Cash Equivalents"
                   title="Enter a unique name for this account (required)">
        </div>

        <div class="form-group">
            <label for="account_number" title="Numeric account identifier; first digit determines category">
                Account Number <span style="color:red;">*</span>
            </label>
            <input type="text" id="account_number" name="account_number"
                   value="{{ request.form.get('account_number', '') }}"
                   required
                   placeholder="e.g. 10100"
                   pattern="[1-5][0-9]*"
                   title="Digits only; must start with 1–5 (1=Asset, 2=Liability, 3=Equity, 4=Revenue, 5=Expense)">
            <div class="category-display">
                Category: <span id="category-display">—</span>
            </div>
            <div class="hint">First digit: 1=Asset, 2=Liability, 3=Equity, 4=Revenue, 5=Expense</div>
        </div>

        <div class="form-group">
            <label for="description" title="Optional longer description of this account's purpose">
                Description
            </label>
            <textarea id="description" name="description" rows="3"
                      placeholder="Optional description…"
                      title="Provide an optional description of this account">{{ request.form.get('description', '') }}</textarea>
        </div>

        <div class="form-group">
            <label for="normal_side" title="The side (Debit or Credit) that increases this account's balance">
                Normal Side <span style="color:red;">*</span>
            </label>
            <select id="normal_side" name="normal_side" required
                    title="Select whether Debit or Credit increases this account">
                <option value="" disabled {% if not request.form.get('normal_side') %}selected{% endif %}>— Select —</option>
                <option value="Debit"  {% if request.form.get('normal_side') == 'Debit'  %}selected{% endif %}>Debit</option>
                <option value="Credit" {% if request.form.get('normal_side') == 'Credit' %}selected{% endif %}>Credit</option>
            </select>
        </div>

        <div class="form-group">
            <label for="subcategory" title="Optional secondary classification (e.g. Current Assets, Fixed Assets)">
                Subcategory
            </label>
            <input type="text" id="subcategory" name="subcategory"
                   value="{{ request.form.get('subcategory', '') }}"
                   placeholder="e.g. Current Assets"
                   title="Enter an optional subcategory for this account">
        </div>

        <div class="form-group">
            <label for="created_at" title="Date and time this account was created">
                Date/Time Created <span style="color:red;">*</span>
            </label>
            <input type="datetime-local" id="created_at" name="created_at"
                   value="{{ request.form.get('created_at', '') }}"
                   required
                   title="Enter the date and time this account was created">
        </div>

        <div class="form-group">
            <label for="initial_balance" title="The starting balance for this account">
                Initial Balance <span style="color:red;">*</span>
            </label>
            <input type="number" id="initial_balance" name="initial_balance"
                   value="{{ request.form.get('initial_balance', '0.00') }}"
                   step="0.01" min="0" required
                   title="Enter the initial balance (required; use 0.00 if none)">
        </div>

        <div class="form-group">
            <label for="display_order" title="Optional numeric ordering hint for display purposes">
                Display Order
            </label>
            <input type="number" id="display_order" name="display_order"
                   value="{{ request.form.get('display_order', '') }}"
                   placeholder="e.g. 10"
                   title="Optional integer to control display ordering">
        </div>

        <div class="form-group">
            <label for="statement" title="The financial statement this account appears on">
                Statement
            </label>
            <select id="statement" name="statement"
                    title="Select the financial statement for this account (BS, IS, or RE)">
                <option value="">— None —</option>
                <option value="BS" {% if request.form.get('statement') == 'BS' %}selected{% endif %}>BS — Balance Sheet</option>
                <option value="IS" {% if request.form.get('statement') == 'IS' %}selected{% endif %}>IS — Income Statement</option>
                <option value="RE" {% if request.form.get('statement') == 'RE' %}selected{% endif %}>RE — Retained Earnings</option>
            </select>
        </div>

        <div class="form-group">
            <label for="comment" title="Optional internal comment or note about this account">
                Comment
            </label>
            <textarea id="comment" name="comment" rows="2"
                      placeholder="Optional internal note…"
                      title="Add an optional comment or note for this account">{{ request.form.get('comment', '') }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" title="Save the new account to the chart of accounts">
                Save Account
            </button>
            <a href="{{ url_for('accounts') }}"
               title="Discard changes and return to the chart of accounts">
                <button type="button" class="btn-secondary">Cancel</button>
            </a>
        </div>

    </form>
</div>

<script>
    const categoryMap = {
        '1': 'Asset',
        '2': 'Liability',
        '3': 'Equity',
        '4': 'Revenue',
        '5': 'Expense'
    };

    function updateCategoryDisplay() {
        const val = document.getElementById('account_number').value.trim();
        const display = document.getElementById('category-display');
        if (val.length > 0 && categoryMap[val[0]]) {
            display.textContent = categoryMap[val[0]];
            display.style.color = '#27ae60';
        } else {
            display.textContent = '—';
            display.style.color = '#2c3e50';
        }
    }

    document.getElementById('account_number').addEventListener('input', updateCategoryDisplay);

    // Initialize on page load (handles form re-render after validation error)
    updateCategoryDisplay();
</script>
{% endblock %}
