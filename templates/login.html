{% extends "layout.html" %}
{% block title %}Login - LockBook{% endblock %}
{% block body %}

<div class="row justify-content-center mt-5">
    <div class="col-sm-10 col-md-6 col-lg-4">
        <div class="card">
            <div class="card-header-primary text-center">
                <i class="bi bi-book-half fs-4 me-2"></i>LockBook
            </div>
            <div class="card-body p-4">
                <h5 class="card-title text-center mb-4">Sign In</h5>
                <form method="POST" action="/login">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Login
                    </button>
                </form>
            </div>
            <div class="card-footer text-center bg-transparent py-3">
                <a href="/forgot-password" class="text-decoration-none small">Forgot Password?</a>
                <span class="text-muted mx-2">·</span>
                <a href="/register-request" class="text-decoration-none small">Request Access</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
