{% extends "layout.html" %}

{% block title %}Send Email - LockBook{% endblock %}

{% block body %}
<div class="nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/admin/users">Manage Users</a>
    <a href="/admin/requests">User Requests</a>
    <a href="/admin/create-user">Create User</a>
    <a href="/admin/expired-passwords">Expired Passwords</a>
    <a href="/logout" style="float: right;">Logout</a>
</div>

<div style="max-width: 600px; margin: 30px auto;">
    <h2>Send Email to {{ user.username }}</h2>
    <p><strong>Email:</strong> {{ user.email }}</p>

    <form method="POST">
        <div class="form-group">
            <label>Subject:</label>
            <input type="text" name="subject" required>
        </div>

        <div class="form-group">
            <label>Message:</label>
            <textarea name="message" rows="8" required></textarea>
        </div>

        <div class="form-group">
            <button type="submit">Send Email</button>
            <a href="/admin/users" class="btn-secondary" style="margin-left: 10px; display: inline-block; padding: 10px 20px;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
