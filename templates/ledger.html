{% extends "layout.html" %}

{% block title %}Ledger{% endblock %}

{% block body %}

<div class="nav">
    <a href="/accounts">Back to Accounts</a>
</div>

<h2>Ledger</h2>

<table>
    <tr>
        <th>Date</th>
        <th>Description</th>
        <th>Debit</th>
        <th>Credit</th>
        <th>Balance</th>
    </tr>

    {% for entry in entries %}
    <tr>
        <td>{{ entry.date }}</td>
        <td>{{ entry.description }}</td>
        <td>{{ entry.debit }}</td>
        <td>{{ entry.credit }}</td>
        <td>{{ entry.balance }}</td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
