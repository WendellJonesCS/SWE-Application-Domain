{% extends "layout.html" %}
{% block title %}Forgot Password - LockBook{% endblock %}
{% block body %}

<div class="row justify-content-center mt-5">
    <div class="col-sm-10 col-md-6 col-lg-4">
        <div class="card">
            <div class="card-header-primary text-center">
                <i class="bi bi-key me-2"></i>Forgot Password
            </div>
            <div class="card-body p-4">
                <p class="text-muted small mb-4">Enter your username and email address to receive a password reset link.</p>
                <form method="POST" action="/forgot-password">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-envelope me-1"></i>Send Reset Link
                    </button>
                </form>
            </div>
            <div class="card-footer text-center bg-transparent py-3">
                <a href="/" class="text-decoration-none small"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
